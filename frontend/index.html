<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice AI Agent - Test Client</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #000000;
            --surface-color: #111111;
            --primary-color: #0d9488;  /* Healthcare Teal */
            --secondary-color: #0ea5e9; /* Medical Blue */
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --danger-color: #ef4444;
            --success-color: #10b981;
            --warning-color: #f59e0b;
            --glass-bg: rgba(0, 0, 0, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-top: 1px solid rgba(20, 184, 166, 0.3); /* Healthcare glow on top edge */
            border-radius: 24px;
            padding: 2.5rem;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        h1 {
            margin: 0;
            font-size: 1.75rem;
            font-weight: 600;
            text-align: center;
            background: linear-gradient(to right, #60a5fa, #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            border: 1px solid var(--glass-border);
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.875rem;
            color: var(--text-secondary);
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: var(--danger-color);
            box-shadow: 0 0 10px var(--danger-color);
            transition: all 0.3s ease;
        }

        .dot.connected {
            background-color: var(--success-color);
            box-shadow: 0 0 10px var(--success-color);
        }
        
        .dot.recording {
            background-color: var(--danger-color);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        .controls {
            display: flex;
            gap: 1rem;
            justify-content: center;
        }

        button {
            padding: 0.75rem 1.5rem;
            border-radius: 12px;
            border: none;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: white;
        }

        #connectBtn {
            background-color: var(--accent-color);
        }

        #connectBtn:hover { background-color: var(--accent-hover); }
        #connectBtn:disabled { background-color: var(--text-secondary); cursor: not-allowed; opacity: 0.5; }

        #recordBtn {
            background-color: var(--danger-color);
        }

        #recordBtn:hover { filter: brightness(1.1); }
        #recordBtn:disabled { background-color: var(--text-secondary); cursor: not-allowed; opacity: 0.5; }
        
        #recordBtn.active {
            background-color: transparent;
            border: 2px solid var(--danger-color);
            color: var(--danger-color);
        }

        .transcript-container {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .box {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 1rem;
            min-height: 80px;
        }

        .box h3 {
            margin: 0 0 0.5rem 0;
            font-size: 0.875rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        #partialTranscript {
            color: var(--text-secondary);
            font-style: italic;
            font-size: 0.95rem;
            min-height: 1.2rem;
        }

        #finalTranscript {
            color: var(--text-primary);
            font-size: 1rem;
            line-height: 1.5;
            max-height: 150px;
            overflow-y: auto;
        }

        #finalTranscript p {
            margin: 0 0 0.5rem 0;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        
        #finalTranscript p:last-child {
            border-bottom: none;
            margin-bottom: 0;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.1);
            border-radius: 8px;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--text-secondary);
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Voice AI Streaming Client</h1>

        <div class="status-panel">
            <div class="status-indicator">
                <div id="wsDot" class="dot"></div>
                <span id="wsStatus">Disconnected</span>
            </div>
            <div class="status-indicator">
                <div id="micDot" class="dot" style="background-color: var(--text-secondary); box-shadow: none;"></div>
                <span id="micStatus">Mic Inactive</span>
            </div>
        </div>

        <div class="controls">
            <select id="languageSelect" style="padding: 0.75rem; border-radius: 12px; border: 1px solid var(--glass-border); background: rgba(0,0,0,0.2); color: white; outline: none; font-family: inherit; font-size: 1rem;">
                <option value="en-US">English</option>
                <option value="hi">Hindi (हिंदी)</option>
                <option value="ta">Tamil (தமிழ்)</option>
            </select>
            <button id="recordBtn" disabled>Start Recording</button>
        </div>

        <div class="transcript-container">
            <div class="box">
                <h3>Partial Transcript</h3>
                <div id="partialTranscript">Waiting for speech...</div>
            </div>
            
            <div class="box" id="appointmentBox" style="border-color: rgba(148, 163, 184, 0.3); background: rgba(148, 163, 184, 0.05);">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem;">
                    <h3 style="color: var(--text-primary); margin: 0;">Appointment Dashboard</h3>
                    <span id="appointmentBadge" style="font-size: 0.75rem; background: var(--glass-border); color: var(--text-secondary); padding: 2px 8px; border-radius: 12px; font-weight: 600;">NO APPOINTMENT</span>
                </div>
                <div id="appointmentDetails" style="font-size: 0.95rem; line-height: 1.6; color: #94a3b8; margin-bottom: 1rem; text-align: center; font-style: italic;">
                    Start speaking to the AI to book a slot...
                </div>
                <div style="display: flex; gap: 0.5rem;">
                    <button id="rescheduleBtn" style="background-color: var(--warning-color); padding: 0.5rem 1rem; font-size: 0.875rem; flex: 1; justify-content: center;">Reschedule</button>
                    <button id="cancelBtn" style="background-color: var(--danger-color); padding: 0.5rem 1rem; font-size: 0.875rem; flex: 1; justify-content: center;">Cancel Slot</button>
                </div>
            </div>
            
            <div id="chatHistory" class="chat-container" style="display: flex; flex-direction: column; gap: 1rem; max-height: 400px; overflow-y: auto; padding: 1rem; background: rgba(15, 23, 42, 0.4); border-radius: 16px; border: 1px solid var(--glass-border); margin-top: 1rem;">
                <div style="align-self: flex-start; background: rgba(255, 255, 255, 0.1); color: #e2e8f0; border-bottom-left-radius: 4px; max-width: 80%; padding: 0.8rem 1rem; border-radius: 16px; font-size: 1rem; line-height: 1.5;">
                    Hello! I am your Healthcare Voice AI Assistant. I can help you book, reschedule, or cancel your medical appointments.
                </div>
            </div>
    </div>

    <!-- Cache busting -->
    <script src="app.js?v=2"></script>
</body>
</html>
